##############################################################################
#  CashMe — overlay de PRODUÇÃO para a VM única na AWS
#
#  Uso:
#    docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
#  Diferenças em relação ao dev (docker-compose.yml):
#    • Volumes Docker named substituídos por bind mounts em /srv/cashme/volumes/*
#      (sobrevivem a `docker compose down -v` e a snapshots simples do EBS).
#    • Portas dos serviços permanecem internas — apenas Caddy expõe :80.
#    • Adicionado serviço `caddy` (reverse proxy + Basic-Auth) que faz fan-out
#      para app + painéis (rotas condicionais conforme profile habilitado).
#    • restart: always em todos os serviços.
#    • app não builda automaticamente — é responsabilidade do `make deploy`.
##############################################################################

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ────────────────────────────────────────────────────────────────────────────
  #  Aplicação
  # ────────────────────────────────────────────────────────────────────────────
  app:
    image: cashme-agent:local
    restart: always
    # Nada exposto pra fora — Caddy alcança via rede docker.
    ports: !reset []
    expose:
      - "8000"
    volumes: !reset
      - /srv/cashme/volumes/app-data:/app/data
    logging: *default-logging

  # ────────────────────────────────────────────────────────────────────────────
  #  Postgres (relacional do app)
  # ────────────────────────────────────────────────────────────────────────────
  cashme-db:
    restart: always
    ports: !reset []
    expose:
      - "5432"
    volumes: !reset
      - /srv/cashme/volumes/postgres:/var/lib/postgresql/data
    logging: *default-logging

  # ────────────────────────────────────────────────────────────────────────────
  #  ChromaDB
  # ────────────────────────────────────────────────────────────────────────────
  chromadb:
    restart: always
    ports: !reset []
    expose:
      - "8000"
    volumes: !reset
      - /srv/cashme/volumes/chromadb:/chroma/chroma
    logging: *default-logging

  # ────────────────────────────────────────────────────────────────────────────
  #  Redis
  # ────────────────────────────────────────────────────────────────────────────
  redis:
    restart: always
    ports: !reset []
    expose:
      - "6379"
    volumes: !reset
      - /srv/cashme/volumes/redis:/data
    logging: *default-logging

  # ────────────────────────────────────────────────────────────────────────────
  #  Caddy — reverse-proxy + Basic-Auth global na porta 80
  # ────────────────────────────────────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: cashme-caddy
    restart: always
    ports:
      - "80:80"
    volumes:
      - /srv/cashme/volumes/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - /srv/cashme/volumes/caddy/data:/data
      - /srv/cashme/volumes/caddy/config:/config
    depends_on:
      - app
    logging: *default-logging

  # ────────────────────────────────────────────────────────────────────────────
  #  Overrides para os serviços opt-in (monitoring/langfuse)
  #  — Mantém o volume bind mount; os profiles continuam controlando se sobem.
  # ────────────────────────────────────────────────────────────────────────────
  prometheus:
    restart: always
    ports: !reset []
    expose: [ "9090" ]
    volumes: !reset
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /srv/cashme/volumes/prometheus:/prometheus
    logging: *default-logging

  grafana:
    restart: always
    ports: !reset []
    expose: [ "3000" ]
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-cashme123}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
      - GF_SERVER_ROOT_URL=http://${PUBLIC_HOST:-localhost}/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes: !reset
      - /srv/cashme/volumes/grafana:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    logging: *default-logging

  tempo:
    restart: always
    ports: !reset []
    expose: [ "3200" ]
    volumes: !reset
      - ./monitoring/tempo/tempo.yml:/etc/tempo.yml:ro
      - /srv/cashme/volumes/tempo:/var/tempo
    logging: *default-logging

  loki:
    restart: always
    ports: !reset []
    expose: [ "3100" ]
    volumes: !reset
      - ./monitoring/loki/loki.yml:/etc/loki/config.yml:ro
      - /srv/cashme/volumes/loki:/loki
    logging: *default-logging

  langfuse:
    restart: always
    ports: !reset []
    expose: [ "3000" ]
    environment:
      - DATABASE_URL=postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      - NEXTAUTH_SECRET=${LANGFUSE_NEXTAUTH_SECRET:-cashme-langfuse-secret-change-me}
      - NEXTAUTH_URL=http://${PUBLIC_HOST:-localhost}/langfuse
      - SALT=${LANGFUSE_SALT:-cashme-langfuse-salt-change-me}
      - TELEMETRY_ENABLED=false
      - LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES=false
    logging: *default-logging

  langfuse-db:
    restart: always
    volumes: !reset
      - /srv/cashme/volumes/langfuse-db:/var/lib/postgresql/data
    logging: *default-logging
