name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff>=0.3.0

      - name: Lint
        run: ruff check app/ tests/

      - name: Format check
        run: ruff format --check app/ tests/

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: "test-key-ci"
      APP_ENV: "test"
      PYTHONPATH: "."

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install core dependencies
        run: |
          pip install --upgrade pip
          pip install \
            fastapi uvicorn pydantic pydantic-settings \
            langchain langchain-core langchain-openai langchain-google-genai \
            langchain-community langchain-classic langchain-chroma langchain-text-splitters \
            langgraph langgraph-prebuilt langgraph-checkpoint \
            agno \
            llama-index llama-index-core llama-index-embeddings-openai \
            llama-index-llms-openai llama-index-vector-stores-chroma \
            chromadb faiss-cpu \
            scikit-learn scipy numpy pandas \
            httpx loguru python-dotenv \
            pytest pytest-asyncio pytest-mock

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: cashme-agent:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
